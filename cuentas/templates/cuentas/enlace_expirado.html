{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexandra Farms | Enlace Expirado</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        :root{--green-dark:#1a3c34;--cream:#faf8f5;--white:#fff;--gray-500:#9e9e9e;--gray-900:#212121;--font-heading:'Montserrat',sans-serif;--font-body:'Roboto',sans-serif;--radius-xl:24px}
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        body{font-family:var(--font-body);background:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center}
        .card{background:var(--white);border-radius:var(--radius-xl);box-shadow:0 16px 48px rgba(0,0,0,.12);padding:48px 44px;width:440px;max-width:95vw;text-align:center;animation:cardIn .6s cubic-bezier(.22,1,.36,1) both}
        @keyframes cardIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
        .warn-icon{width:64px;height:64px;border-radius:50%;background:#fffbeb;display:flex;align-items:center;justify-content:center;font-size:28px;color:#d69e2e;margin:0 auto 20px}
        .card h1{font-family:var(--font-heading);font-weight:700;font-size:22px;color:var(--gray-900);margin-bottom:8px}
        .card p{font-size:14px;color:var(--gray-500);line-height:1.6;margin-bottom:24px}
        .btn-back{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;font-family:var(--font-heading);font-weight:600;font-size:14px;color:var(--white);background:var(--green-dark);border:none;border-radius:8px;cursor:pointer;text-decoration:none;transition:.3s}
        .btn-back:hover{background:#2d6a5a;transform:translateY(-1px)}
    </style>
</head>
<body>
    <div class="card">
        <div class="warn-icon"><i class="fas fa-clock"></i></div>
        <h1>Enlace Expirado</h1>
        <p>Su contraseña temporal ha caducado (tenía 72 horas de vigencia). Por favor contacte a su vendedor asignado en Alexandra Farms para que le genere nuevas credenciales de acceso.</p>
        <a href="{% url 'login' %}" class="btn-back"><i class="fas fa-arrow-left"></i> Volver al Login</a>
    </div>
</body>
</html>
